<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glucose & Hormone Tracker</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --bg-color: #fffcf9; --text-main: #999999; --area-2: #5bc6e1; --border-color: #eee; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; }
        .controls { display: flex; gap: 5px; margin-bottom: 10px; justify-content: flex-end; flex-wrap: wrap; }
        input[type="date"] { padding: 5px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 5px; }
        button { padding: 5px 10px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; background: var(--area-2); color: white; }
        #reset-btn { font-size: 10px; padding: 3px 8px; background: #ff9999; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { border-bottom: 2px solid #ccc; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="date" id="start-date">
        <span>~</span>
        <input type="date" id="end-date">
        <button onclick="applyDateRange()">보기</button>
    </div>

    <div style="height: 300px;">
        <canvas id="glucoseChart"></canvas>
    </div>

    <div id="table-container" style="margin-top: 20px;"></div>

    <button id="reset-btn" onclick="resetData()">데이터 초기화</button>

    <script>
        let glucoseChart;
        let allData = []; // CSV 파싱 데이터 저장

        // 2. 그래프 선 얇게 및 점 제거 설정
        function initChart() {
            const ctx = document.getElementById('glucoseChart').getContext('2d');
            glucoseChart = new Chart(ctx, {
                type: 'line',
                data: { datasets: [{ label: '혈당', data: [], borderColor: '#5bc6e1', borderWidth: 1.5, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time' } } }
            });
        }

        function applyDateRange() {
            const start = new Date(document.getElementById('start-date').value).getTime();
            const end = new Date(document.getElementById('end-date').value).setHours(23,59,59);
            glucoseChart.options.scales.x.min = start;
            glucoseChart.options.scales.x.max = end;
            glucoseChart.update();
        }

        // 3. 데이터 상세 보기 로직
        function showDailyDetail(dateStr) {
            const dailyData = allData.filter(d => d.timestamp.startsWith(dateStr));
            let html = `<button onclick="renderMonthlySummary()">❮ 요약으로</button>
                        <table><tr><th>시간</th><th>혈당</th><th>탄수화물</th><th>인슐린</th></tr>`;
            dailyData.forEach(d => {
                html += `<tr><td>${d.time}</td><td>${d.glucose}</td><td>${d.carbs}</td><td>${d.insulin}</td></tr>`;
            });
            html += `</table>`;
            document.getElementById('table-container').innerHTML = html;
        }

        function resetData() {
            if(confirm("정말 초기화하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        initChart();
    </script>
</body>
</html>
